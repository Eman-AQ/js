<!DOCTYPE html>
<html>

<head>
    <title>My Info</title>
</head>

<body>

    <script>
        // 1. Declare variables
        let name, gpa, major, favoriteHobby;

        // 2. Assign your personal information
        name = 'Eman';
        gpa = 3.8;
        major = "Electronics Engineering";
        favoriteHobby = "Drawing";

        // 3. Display the information

        alert('Name: ' + name + "\nGPA: " + gpa + "\nMajor: " + major + "\nHobby: " + favoriteHobby);

        console.log("Name:", name);
        console.log("GPA:", gpa);
        console.log("Major:", major);
        console.log("Hobby:", favoriteHobby);

        document.write("<h2>My Information</h2>");
        document.write("Name: " + name + "<br>");
        document.write("GPA: " + gpa + "<br>");
        document.write("Major: " + major + "<br>");
        document.write("Hobby: " + favoriteHobby);
    </script>

</body>

</html>
